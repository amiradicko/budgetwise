<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Dégradé bleu cyan style Nefertiti -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e27;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1f3a;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d9ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0088ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0055ff;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00d9ff;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#0088ff;stop-opacity:0.3" />
    </linearGradient>
    
    <!-- Filtre glow -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Fond noir/bleu foncé -->
  <rect width="512" height="512" rx="120" fill="url(#bgGrad)"/>
  
  <!-- Circuits électroniques en arrière-plan -->
  <g opacity="0.15" stroke="#00d9ff" stroke-width="2" fill="none">
    <line x1="50" y1="100" x2="150" y2="100"/>
    <circle cx="150" cy="100" r="4" fill="#00d9ff"/>
    <line x1="150" y1="100" x2="200" y2="140"/>
    
    <line x1="400" y1="150" x2="480" y2="150"/>
    <circle cx="400" cy="150" r="4" fill="#00d9ff"/>
    
    <line x1="80" y1="400" x2="180" y2="400"/>
    <circle cx="80" cy="400" r="4" fill="#00d9ff"/>
    <line x1="180" y1="400" x2="180" y2="450"/>
    <circle cx="180" cy="450" r="4" fill="#00d9ff"/>
    
    <line x1="420" y1="380" x2="480" y2="380"/>
    <circle cx="420" cy="380" r="4" fill="#00d9ff"/>
  </g>
  
  <!-- Lettre "B" stylisée avec effet circuit -->
  <g transform="translate(120, 140)">
    <!-- Partie principale du B -->
    <path d="M 60 0 L 60 220 L 160 220 Q 220 220 220 160 Q 220 120 180 110 Q 210 100 210 60 Q 210 0 150 0 Z M 100 40 L 150 40 Q 170 40 170 60 Q 170 80 150 80 L 100 80 Z M 100 120 L 160 120 Q 180 120 180 150 Q 180 180 160 180 L 100 180 Z" 
          fill="url(#blueGrad)" 
          filter="url(#glow)"/>
    
    <!-- Effet pixels qui se dispersent (style Nefertiti) -->
    <g opacity="0.8">
      <rect x="10" y="50" width="8" height="8" fill="#00d9ff"/>
      <rect x="20" y="45" width="6" height="6" fill="#00d9ff" opacity="0.8"/>
      <rect x="15" y="65" width="7" height="7" fill="#0088ff" opacity="0.7"/>
      <rect x="25" y="70" width="5" height="5" fill="#0088ff" opacity="0.6"/>
      <rect x="8" y="80" width="6" height="6" fill="#00d9ff" opacity="0.5"/>
      <rect x="18" y="90" width="4" height="4" fill="#0088ff" opacity="0.4"/>
      <rect x="12" y="100" width="5" height="5" fill="#00d9ff" opacity="0.3"/>
      
      <rect x="10" y="120" width="7" height="7" fill="#00d9ff" opacity="0.7"/>
      <rect x="20" y="130" width="5" height="5" fill="#0088ff" opacity="0.5"/>
      <rect x="15" y="145" width="6" height="6" fill="#00d9ff" opacity="0.4"/>
    </g>
    
    <!-- Symbole dollar intégré -->
    <text x="130" y="150" font-family="Arial, sans-serif" font-size="60" font-weight="bold" fill="#ffffff" opacity="0.9">$</text>
  </g>
  
  <!-- Circuits électroniques qui s'étendent à droite -->
  <g stroke="#00d9ff" stroke-width="3" fill="none" opacity="0.6" filter="url(#glow)">
    <line x1="340" y1="220" x2="420" y2="220"/>
    <circle cx="420" cy="220" r="5" fill="#00d9ff"/>
    <line x1="420" y1="220" x2="460" y2="240"/>
    <circle cx="460" cy="240" r="4" fill="#00d9ff"/>
    
    <line x1="340" y1="260" x2="400" y2="260"/>
    <circle cx="400" cy="260" r="5" fill="#00d9ff"/>
    <line x1="400" y1="260" x2="450" y2="280"/>
    <circle cx="450" cy="280" r="4" fill="#00d9ff"/>
    
    <line x1="340" y1="300" x2="390" y2="300"/>
    <circle cx="390" cy="300" r="5" fill="#00d9ff"/>
    <line x1="390" y1="300" x2="440" y2="320"/>
    <circle cx="440" cy="320" r="4" fill="#00d9ff"/>
  </g>
  
  <!-- Particules lumineuses flottantes -->
  <g fill="#00d9ff" opacity="0.8">
    <circle cx="380" cy="140" r="3"/>
    <circle cx="420" cy="160" r="2"/>
    <circle cx="410" cy="180" r="2.5"/>
    <circle cx="90" cy="380" r="3"/>
    <circle cx="120" cy="400" r="2"/>
    <circle cx="100" cy="420" r="2.5"/>
  </g>
  
  <!-- Texte "BudgetWise" optionnel (peut être retiré pour icon-only) -->
  <text x="256" y="420" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="url(#blueGrad)" text-anchor="middle" filter="url(#glow)">BudgetWise</text>
</svg>
