<svg width="200" height="50" viewBox="0 0 200 50" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ndsGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d9ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0088ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0055ff;stop-opacity:1" />
    </linearGradient>
    
    <filter id="ndsGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Logo "N" stylisé -->
  <g transform="translate(5, 10)">
    <!-- Lettre N -->
    <path d="M 5 0 L 5 30 L 8 30 L 8 8 L 20 30 L 23 30 L 23 0 L 20 0 L 20 22 L 8 0 Z" 
          fill="url(#ndsGrad)" 
          filter="url(#ndsGlow)"/>
    
    <!-- Pixels dispersés (signature) -->
    <g opacity="0.8">
      <rect x="0" y="8" width="3" height="3" fill="#00d9ff"/>
      <rect x="1" y="6" width="2" height="2" fill="#00d9ff" opacity="0.7"/>
      <rect x="-1" y="14" width="2.5" height="2.5" fill="#0088ff" opacity="0.6"/>
    </g>
  </g>
  
  <!-- Texte "NEFERTITI" -->
  <text x="35" y="26" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="url(#ndsGrad)" filter="url(#ndsGlow)">NEFERTITI</text>
  
  <!-- Texte "DIGITAL SOLUTIONS" -->
  <text x="35" y="40" font-family="Arial, sans-serif" font-size="8" fill="#00d9ff" opacity="0.8">DIGITAL SOLUTIONS</text>
  
  <!-- Décoration circuits -->
  <g stroke="#00d9ff" stroke-width="1" fill="none" opacity="0.3">
    <line x1="130" y1="15" x2="150" y2="15"/>
    <circle cx="150" cy="15" r="2" fill="#00d9ff"/>
    <line x1="150" y1="15" x2="165" y2="25"/>
    <circle cx="165" cy="25" r="1.5" fill="#00d9ff"/>
  </g>
</svg>