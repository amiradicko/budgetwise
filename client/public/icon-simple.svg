<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Dégradé bleu cyan style Nefertiti -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e27;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1f3a;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d9ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0088ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0055ff;stop-opacity:1" />
    </linearGradient>
    
    <!-- Filtre glow -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Fond noir/bleu foncé -->
  <rect width="512" height="512" rx="120" fill="url(#bgGrad)"/>
  
  <!-- Circuits électroniques en arrière-plan -->
  <g opacity="0.15" stroke="#00d9ff" stroke-width="2" fill="none">
    <line x1="50" y1="100" x2="150" y2="100"/>
    <circle cx="150" cy="100" r="4" fill="#00d9ff"/>
    <line x1="150" y1="100" x2="200" y2="140"/>
    
    <line x1="400" y1="150" x2="480" y2="150"/>
    <circle cx="400" cy="150" r="4" fill="#00d9ff"/>
    
    <line x1="80" y1="400" x2="180" y2="400"/>
    <circle cx="80" cy="400" r="4" fill="#00d9ff"/>
    <line x1="180" y1="400" x2="180" y2="450"/>
    <circle cx="180" cy="450" r="4" fill="#00d9ff"/>
    
    <line x1="420" y1="380" x2="480" y2="380"/>
    <circle cx="420" cy="380" r="4" fill="#00d9ff"/>
  </g>
  
  <!-- Lettre "B" stylisée centrée -->
  <g transform="translate(140, 160)">
    <!-- Partie principale du B -->
    <path d="M 40 0 L 40 200 L 130 200 Q 180 200 180 150 Q 180 115 145 105 Q 170 95 170 55 Q 170 0 120 0 Z M 75 35 L 120 35 Q 135 35 135 55 Q 135 75 120 75 L 75 75 Z M 75 110 L 130 110 Q 145 110 145 140 Q 145 170 130 170 L 75 170 Z" 
          fill="url(#blueGrad)" 
          filter="url(#glow)"/>
    
    <!-- Effet pixels qui se dispersent (style Nefertiti) -->
    <g opacity="0.8">
      <rect x="-5" y="45" width="10" height="10" fill="#00d9ff"/>
      <rect x="5" y="40" width="8" height="8" fill="#00d9ff" opacity="0.8"/>
      <rect x="0" y="60" width="9" height="9" fill="#0088ff" opacity="0.7"/>
      <rect x="10" y="65" width="7" height="7" fill="#0088ff" opacity="0.6"/>
      <rect x="-8" y="75" width="8" height="8" fill="#00d9ff" opacity="0.5"/>
      <rect x="3" y="85" width="6" height="6" fill="#0088ff" opacity="0.4"/>
      <rect x="-3" y="95" width="7" height="7" fill="#00d9ff" opacity="0.3"/>
      
      <rect x="-5" y="115" width="9" height="9" fill="#00d9ff" opacity="0.7"/>
      <rect x="5" y="125" width="7" height="7" fill="#0088ff" opacity="0.5"/>
      <rect x="0" y="140" width="8" height="8" fill="#00d9ff" opacity="0.4"/>
    </g>
    
    <!-- Symbole dollar intégré -->
    <text x="105" y="135" font-family="Arial, sans-serif" font-size="70" font-weight="bold" fill="#ffffff" opacity="0.95">$</text>
  </g>
  
  <!-- Circuits électroniques qui s'étendent -->
  <g stroke="#00d9ff" stroke-width="3" fill="none" opacity="0.6" filter="url(#glow)">
    <line x1="340" y1="240" x2="420" y2="240"/>
    <circle cx="420" cy="240" r="5" fill="#00d9ff"/>
    <line x1="420" y1="240" x2="460" y2="260"/>
    <circle cx="460" cy="260" r="4" fill="#00d9ff"/>
    
    <line x1="340" y1="280" x2="400" y2="280"/>
    <circle cx="400" cy="280" r="5" fill="#00d9ff"/>
    <line x1="400" y1="280" x2="450" y2="300"/>
    <circle cx="450" cy="300" r="4" fill="#00d9ff"/>
  </g>
  
  <!-- Particules lumineuses flottantes -->
  <g fill="#00d9ff" opacity="0.8">
    <circle cx="380" cy="140" r="4"/>
    <circle cx="420" cy="160" r="3"/>
    <circle cx="410" cy="180" r="3.5"/>
    <circle cx="90" cy="380" r="4"/>
    <circle cx="120" cy="400" r="3"/>
    <circle cx="100" cy="420" r="3.5"/>
  </g>
</svg>